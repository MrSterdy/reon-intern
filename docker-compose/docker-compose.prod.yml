services:
  postgres:
    image: postgres:18-alpine
    container_name: reon-practice-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:?POSTGRES_USERNAME_required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}
      POSTGRES_DB: ${POSTGRES_DATABASE:?POSTGRES_DATABASE_required}
    volumes:
      - postgres-reon-practice-prod-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USERNAME:-reon_practice} -d ${POSTGRES_DATABASE:-reon_practice}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.prod
    container_name: reon-practice-backend-prod
    environment:
      NODE_ENV: production
      PORT: ${PORT:?PORT_required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT_required}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:?POSTGRES_USERNAME_required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:?POSTGRES_DATABASE_required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY_required}
      AMO_CLIENT_ID: ${AMO_CLIENT_ID:?AMO_CLIENT_ID_required}
      AMO_CLIENT_SECRET: ${AMO_CLIENT_SECRET:?AMO_CLIENT_SECRET_required}
      AMO_INTEGRATION_BASE_URL: ${AMO_INTEGRATION_BASE_URL:?AMO_INTEGRATION_BASE_URL_required}
      AMO_ERROR_TASK_TYPE_ID: ${AMO_ERROR_TASK_TYPE_ID:?AMO_ERROR_TASK_TYPE_ID_required}
      AMO_CHECK_TASK_TYPE_ID: ${AMO_CHECK_TASK_TYPE_ID:?AMO_CHECK_TASK_TYPE_ID_required}
    ports:
      - target: 3000
        published: ${PORT:?PORT_required}
        protocol: tcp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-reon-practice-prod-data:
