services:
  postgres:
    image: postgres:18-alpine
    container_name: reon-practice-postgres
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-reon_practice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reon_practice}
      POSTGRES_DB: ${POSTGRES_DATABASE:-reon_practice}
    volumes:
      - postgres-reon-practice-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USERNAME:-reon_practice} -d ${POSTGRES_DATABASE:-reon_practice}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-reon-practice-data:
